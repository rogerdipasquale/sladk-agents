image:
  repository: ghcr.io/rogerdipasquale/sladk-agents
  tag: initial
  pullPolicy: Always
resources:
  limits:
    cpu: 1000m
    memory: 1024M
  requests: 
    cpu: 400m
    memory: 512M
selectorLabels: 
  app: sladk
  env: test
  purpose: ia
labels:
  app: sladk
  purpose: ia
replcaCount: 1
hpaRequired: true
hpa:
  scaleDown:
    policies:
      percentPeriodSeconds: 15
      percentType: Percent
      percentValue: 100
    selectPolicy: Max
    stabilizationWindowSeconds: 300
  scaleUp:
    policies:
      podsPeriodSeconds: 15
      podsType: Pods
      podsValue: 4
      percentPeriodSeconds: 15
      percentType: Percent
      percentValue: 100
    selectPolicy: Max
    stabilizationWindowSeconds: 0
  maxReplicas: 1
  minReplicas: 1
  memory:
    averageUtilization: 90
  cpu:
    averageUtilization: 90
livenessprobe:
  failureThreshold: 3
  exec:
    command:
      - /bin/sh
      - -c
      - "if [[ $(ps |grep app.py |wc -l)  -le 1 ]];then  exit 1;else exit 0; fi"
  initialDelaySeconds: 10
  periodSeconds: 60
  successThreshold: 1
  timeoutSeconds: 2
startupprobe:
  exec:
    command:
      - /bin/sh
      - -c
      - "if [[ $(ps |grep app.py |wc -l)  -le 1 ]];then  exit 1;else exit 0; fi"
  failureThreshold: 3
  initialDelaySeconds: 2
  periodSeconds: 5
  successThreshold: 1
  timeoutSeconds: 1
secretRef: sladk-secrets

